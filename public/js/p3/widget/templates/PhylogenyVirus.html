<div class="phylogenyVirus">
    <div class="section" style="padding: 0 5px;">
        <div data-dojo-attach-point="cardsHostNode" class="cardsHost"></div>

        <div data-dojo-attach-point="viewerPaneNode" style="display:none;">
            <div class="phyloVirusLayout">
                <!-- left column: header + tree/nextstrain content -->
                <div data-dojo-attach-point="viewerContentNode" class="phyloVirusContent">
                    <div class="phyloVirusHeader">
                        <div data-dojo-type="dijit/form/Button" data-dojo-attach-event="onClick:_showCards">← Back to trees</div>
                        <div class="section-title close" style="margin: 0;">
                            <span data-dojo-attach-point="viewerTitleNode" class="wrap"></span>
                        </div>
                    </div>
                    <div data-dojo-attach-point="viewerHostNode"></div>
                </div>
                <!-- right column: action bar -->
                <div data-dojo-attach-point="actionBarHostNode" class="phyloVirusActionBarHost"></div>
            </div>
        </div>
    </div>
</div>
